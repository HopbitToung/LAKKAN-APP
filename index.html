<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>LAKKAN · แลกกัน</title>
<style>
:root{
  --pink:#F0509E; --pink-d:#D83A87; --pink-l:#FFE3F1; --blue:#2D8CF0; --blue-d:#1E6FD0;
  --cream:#FFF0F7; --navy:#102A43; --navy-2:#1B3A5B;
  --ink:#1B2B3A; --slate:#41556B; --muted:#8497AB; --line:#EAEEF3; --bg:#F4F6F9;
  --green:#16A34A; --amber:#B7791F; --red:#DC2626; --white:#fff; --tGreen:#E9F8EF; --tAmber:#FFF6E5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:"Sarabun","Leelawadee UI","Segoe UI",Tahoma,sans-serif;background:#c9d3de;color:var(--ink);}
#app{max-width:440px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;display:flex;flex-direction:column;box-shadow:0 0 50px rgba(0,0,0,.18);}
.topbar{background:linear-gradient(120deg,var(--navy),var(--navy-2));color:#fff;padding:15px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20;}
.topbar .logo{font-weight:800;font-size:20px;letter-spacing:.3px;}
.topbar .logo b{color:var(--pink);}
.topbar .sp{flex:1;}
.topbar .who{font-size:12px;opacity:.9;display:flex;align-items:center;gap:4px;}
.vbadge{background:var(--green);color:#fff;font-size:9px;font-weight:800;border-radius:20px;padding:1px 7px;}
.modstrip{display:flex;gap:6px;overflow-x:auto;padding:8px 12px;background:#0b2030;position:sticky;top:53px;z-index:19;}
.modstrip::-webkit-scrollbar{display:none;}
.mpill{white-space:nowrap;border:none;background:#17324a;color:#cbd6e2;padding:6px 13px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;}
.mpill.on{background:var(--pink);color:#fff;}
.body{flex:1;padding:16px 15px 92px;overflow-y:auto;}
h2.title{font-size:21px;font-weight:800;color:var(--navy);margin:2px 0 2px;}
.sub{font-size:12.5px;color:var(--muted);margin-bottom:14px;}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:13px;box-shadow:0 2px 8px rgba(16,42,67,.05);}
.row{display:flex;gap:10px;align-items:center;}
.btn{display:inline-block;border:none;border-radius:12px;padding:13px 16px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;text-align:center;transition:.15s;}
.btn.pink{background:var(--pink);color:#fff;box-shadow:0 4px 12px rgba(240,80,158,.3);} .btn.pink:active{background:var(--pink-d);}
.btn.blue{background:var(--blue);color:#fff;} .btn.blue:active{background:var(--blue-d);}
.btn.navy{background:var(--navy);color:#fff;}
.btn.ghost{background:#fff;color:var(--navy);border:1.5px solid var(--line);}
.btn.green{background:var(--green);color:#fff;}
.btn.red{background:#fff;color:var(--red);border:1.5px solid #f3c2c2;}
.btn.sm{width:auto;padding:9px 14px;font-size:13px;border-radius:10px;}
.btn:disabled{opacity:.45;box-shadow:none;}
input,textarea,select{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px 13px;font-size:14.5px;font-family:inherit;background:#fbfcfe;margin-top:6px;color:var(--ink);}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--pink);background:#fff;}
label{font-size:12.5px;font-weight:700;color:var(--slate);}
.field{margin-bottom:12px;}
.pill{display:inline-block;padding:3px 11px;border-radius:20px;font-size:11.5px;font-weight:700;}
.p-av{background:var(--cream);color:var(--pink-d);}
.p-warn{background:var(--tAmber);color:var(--amber);}
.p-ok{background:var(--tGreen);color:var(--green);}
.p-blue{background:#EAF2FD;color:var(--blue);}
.item{display:flex;gap:12px;align-items:center;}
.thumb{width:58px;height:58px;border-radius:14px;background:linear-gradient(135deg,var(--cream),#e9f2ff);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden;}
.thumb img{width:100%;height:100%;object-fit:cover;}
.item .t{font-weight:700;font-size:14.5px;color:var(--ink);}
.item .m{font-size:12px;color:var(--muted);}
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:#fff;border-top:1px solid var(--line);display:flex;z-index:20;box-shadow:0 -4px 16px rgba(0,0,0,.05);}
.bottomnav button{flex:1;border:none;background:none;padding:9px 0 11px;font-family:inherit;font-size:10.5px;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bottomnav button .ic{font-size:21px;}
.bottomnav button.on{color:var(--pink);font-weight:700;}
.center{min-height:88vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;}
.splash-logo{font-size:44px;font-weight:800;color:var(--navy);letter-spacing:-.5px;}
.splash-logo b{color:var(--pink);}
.tag{font-size:13px;color:var(--slate);margin:8px 0 28px;}
.hint{background:#fff8fb;border:1px dashed var(--pink);border-radius:12px;padding:12px 14px;font-size:12.5px;color:var(--pink-d);margin-bottom:12px;}
.warnbox{background:var(--tAmber);border-left:4px solid var(--amber);border-radius:10px;padding:11px 13px;font-size:12.5px;color:#7a5712;margin-bottom:12px;}
.okbox{background:var(--tGreen);border-left:4px solid var(--green);border-radius:10px;padding:11px 13px;font-size:12.5px;color:#15803d;margin-bottom:12px;}
.kyc-banner{background:linear-gradient(120deg,#fff,var(--cream));border:1px solid var(--pink-l);border-radius:14px;padding:14px;margin-bottom:14px;display:flex;gap:12px;align-items:center;}
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.kpi .k{background:#fff;border:1px solid var(--line);border-radius:15px;padding:14px;box-shadow:0 2px 6px rgba(16,42,67,.04);}
.kpi .k .n{font-size:24px;font-weight:800;color:var(--navy);}
.kpi .k .l{font-size:11.5px;color:var(--muted);margin-top:2px;}
.state-flow{display:flex;flex-wrap:wrap;gap:5px;margin:9px 0 2px;}
.state-flow span{font-size:10px;padding:3px 8px;border-radius:8px;background:#eef2f7;color:var(--muted);}
.state-flow span.done{background:var(--tGreen);color:var(--green);}
.state-flow span.cur{background:var(--pink);color:#fff;}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
.tbl th,.tbl td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:left;}
.tbl th{color:var(--muted);font-weight:700;}
.link{color:var(--blue);font-weight:700;cursor:pointer;font-size:13px;}
.err{color:var(--red);font-size:12.5px;margin-top:6px;}
.ai{background:linear-gradient(135deg,#fff,#f4f9ff);border:1px solid #d8e6f5;}
.spin{border:3px solid #eee;border-top:3px solid var(--pink);border-radius:50%;width:26px;height:26px;animation:s 1s linear infinite;margin:10px auto;}
@keyframes s{to{transform:rotate(360deg);}}
.small{font-size:11.5px;color:var(--muted);}
.qrbox{width:104px;height:104px;margin:0 auto;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
.qrbox img,.qrbox canvas{max-width:100%;height:auto;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.pcard{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(16,42,67,.05);}
.pcard:active{transform:scale(.98);}
.pcard .img{position:relative;width:100%;aspect-ratio:1/1;background:linear-gradient(135deg,var(--cream),#e9f2ff);display:flex;align-items:center;justify-content:center;font-size:46px;overflow:hidden;}
.pcard .img>img{width:100%;height:100%;object-fit:cover;}
.pcard .av{position:absolute;left:8px;bottom:8px;width:32px;height:32px;border-radius:50%;border:2px solid #fff;background:#eaf0f6;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 6px rgba(0,0,0,.25);}
.pcard .av img{width:100%;height:100%;object-fit:cover;}
.pcard .pv{position:absolute;left:34px;bottom:9px;background:var(--green);color:#fff;font-size:8px;font-weight:800;border-radius:10px;padding:1px 5px;border:1.5px solid #fff;}
.pcard .info{padding:9px 11px 11px;}
.pcard .nm{font-weight:700;font-size:13.5px;color:var(--ink);line-height:1.25;height:34px;overflow:hidden;}
.pcard .pr{color:var(--pink-d);font-weight:800;font-size:14px;margin-top:3px;}
.pcard .ct{font-size:10.5px;color:var(--muted);margin-top:1px;}
.pcard.locked{background:#FFF9E6;border-color:#F0D264;}
.up{border:2px dashed var(--line);border-radius:13px;padding:16px;text-align:center;cursor:pointer;background:#fbfcfe;margin-top:6px;}
.up img{max-width:100%;border-radius:10px;max-height:150px;}
.up .ph{font-size:30px;}
.seg{display:flex;background:#eef2f7;border-radius:12px;padding:3px;margin-bottom:14px;}
.seg button{flex:1;border:none;background:none;padding:9px;border-radius:9px;font-family:inherit;font-size:13.5px;font-weight:700;color:var(--muted);cursor:pointer;}
.seg button.on{background:#fff;color:var(--pink);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.stat-chip{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--slate);}
</style>
</head>
<body>
<div id="app"><div class="center"><div class="spin"></div><div class="small">กำลังโหลด…</div></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>
<script type="module">
/* ============================================================
   LAKKAN · แลกกัน — Firebase web app (Pilot) · v3
   >>> ตั้งค่า firebaseConfig และ GEMINI_API_KEY ด้านล่าง <<<
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyD1qeNjFrU-zGvvij9OyDDHgLzu-WoI1g4",
  authDomain: "lakkan-pilot.firebaseapp.com",
  projectId: "lakkan-pilot",
  storageBucket: "lakkan-pilot.firebasestorage.app",
  messagingSenderId: "969305561801",
  appId: "1:969305561801:web:6752e19db3ec9c3e6a4b18"
};
const GEMINI_API_KEY = "AQ.Ab8RN6JZ9OCzkzbLwUJKZlnz3heBEHrZmOPGq2DFXLR50-CUsg";
/* ============================================================ */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, addDoc, getDoc, updateDoc,
  onSnapshot, serverTimestamp, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const CONFIGURED = !firebaseConfig.apiKey.startsWith("PASTE");
const AI_ON = !GEMINI_API_KEY.startsWith("PASTE");
let auth, db;
if (CONFIGURED){ const fb=initializeApp(firebaseConfig); auth=getAuth(fb); db=getFirestore(fb); }

const S = { user:null, profile:null, role:"member", view:"feed",
  items:[], exchanges:[], users:{}, sel:null, ai:null, aiLoading:false, err:"", kycTmp:{} };
const CATS = ["เสื้อผ้า","รองเท้า","หนังสือ","ของสะสม","ของเล่น","อิเล็กทรอนิกส์","ของแต่งบ้าน","อื่นๆ"];
const CATICON = {"เสื้อผ้า":"👕","รองเท้า":"👟","หนังสือ":"📚","ของสะสม":"🏺","ของเล่น":"🧸","อิเล็กทรอนิกส์":"📱","ของแต่งบ้าน":"🖼️","อื่นๆ":"📦"};
const ROYALTY=3, DEPOSIT=100;
const STATES=["Proposed","Accepted","Deposited","AtHub","Validated","Locked","Shipping","Completed"];
const STATE_TH={Proposed:"เสนอแลก",Accepted:"ยอมรับแล้ว",Deposited:"วางมัดจำแล้ว",AtHub:"ถึงฮับ",Validated:"ตรวจผ่าน",Locked:"ล็อกไขว้",Shipping:"กำลังจัดส่ง",Completed:"สำเร็จ",Returned:"ตีกลับ"};

const $ = (h)=>{const d=document.createElement("div");d.innerHTML=h;return d.firstElementChild;};
const app = document.getElementById("app");
const esc = (s)=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const myItems = ()=>S.items.filter(i=>i.ownerUid===S.user.uid);
const availOthers = ()=>S.items.filter(i=>i.ownerUid!==S.user.uid && i.status==="available");
const verified = ()=>S.profile?.kyc?.status==="verified";
async function guard(fn){ try{ await fn(); }catch(e){ console.error(e); alert("เกิดข้อผิดพลาด: "+(e.code||e.message||e)); } }

/* ---------- boot ---------- */
if(!CONFIGURED){ renderSetupNeeded(); }
else {
  onAuthStateChanged(auth, async (u)=>{
    if(u){ S.user=u; await ensureProfile(u); subscribe(); render(); }
    else { S.user=null; render(); }
  });
}
function renderSetupNeeded(){
  app.innerHTML="";
  app.appendChild($(`<div class="center"><div class="splash-logo">แลก<b>กัน</b></div>
    <div class="tag">LAKKAN · ระบบแลกเปลี่ยนที่เชื่อถือได้</div>
    <div class="warnbox" style="text-align:left">ยังไม่ได้ตั้งค่า Firebase — วางค่า <b>firebaseConfig</b> ในไฟล์ index.html ก่อนใช้งาน</div></div>`));
}
async function ensureProfile(u){
  const ref=doc(db,"users",u.uid);
  const snap=await getDoc(ref);
  if(!snap.exists()){
    await setDoc(ref,{name:u.displayName||u.email.split("@")[0],email:u.email,phone:"",kyc:{status:"none"},createdAt:serverTimestamp()});
  }
  S.profile=(await getDoc(ref)).data();
}
let unsubItems=null, unsubEx=null, unsubUsers=null;
function subscribe(){
  unsubItems&&unsubItems(); unsubEx&&unsubEx(); unsubUsers&&unsubUsers();
  unsubItems=onSnapshot(collection(db,"items"),s=>{ S.items=s.docs.map(d=>({id:d.id,...d.data()})); render(); });
  unsubEx=onSnapshot(collection(db,"exchanges"),s=>{ const arr=s.docs.map(d=>({id:d.id,...d.data()})); const seen=S._exSeen||{}; const cur={};
    arr.forEach(e=>{ cur[e.id]=e.state; if(S.user&&(e.aUid===S.user.uid||e.bUid===S.user.uid)&&S._exInit&&seen[e.id]!==e.state) notifyChange(e,seen[e.id]); });
    S._exSeen=cur; S._exInit=true; S.exchanges=arr; render(); });
  unsubUsers=onSnapshot(collection(db,"users"),s=>{ S.users={}; s.docs.forEach(d=>S.users[d.id]=d.data()); if(S.user&&S.users[S.user.uid])S.profile=S.users[S.user.uid]; render(); });
}

/* ---------- auth actions ---------- */
async function signUp(name,email,pass){ S.err="";
  try{ const c=await createUserWithEmailAndPassword(auth,email,pass);
    await setDoc(doc(db,"users",c.user.uid),{name,email,phone:"",kyc:{status:"none"},createdAt:serverTimestamp()});
  }catch(e){ S.err=fbErr(e); render(); } }
async function signIn(email,pass){ S.err=""; try{ await signInWithEmailAndPassword(auth,email,pass);}catch(e){ S.err=fbErr(e); render(); } }
async function googleIn(){ S.err=""; try{ await signInWithPopup(auth,new GoogleAuthProvider()); }catch(e){ S.err=fbErr(e); render(); } }
function fbErr(e){ const m=(e.code||"").replace("auth/","");
  return ({"invalid-email":"อีเมลไม่ถูกต้อง","weak-password":"รหัสผ่านสั้นเกินไป (อย่างน้อย 6 ตัว)","email-already-in-use":"อีเมลนี้ถูกใช้แล้ว","invalid-credential":"อีเมลหรือรหัสผ่านไม่ถูกต้อง","popup-closed-by-user":"ปิดหน้าต่างก่อนเข้าสู่ระบบ","unauthorized-domain":"โดเมนนี้ยังไม่ได้อนุญาตใน Firebase (Authentication → Settings → Authorized domains)"}[m]||("ผิดพลาด: "+(e.code||e.message))); }

/* ---------- KYC ---------- */
function resizeImage(file,max){ return new Promise((res,rej)=>{
  const r=new FileReader(); r.onload=()=>{ const img=new Image(); img.onload=()=>{
    let{width:w,height:h}=img; if(w>h){ if(w>max){h=h*max/w;w=max;} } else { if(h>max){w=w*max/h;h=max;} }
    const cv=document.createElement("canvas"); cv.width=w; cv.height=h; cv.getContext("2d").drawImage(img,0,0,w,h);
    res(cv.toDataURL("image/jpeg",0.7)); }; img.onerror=rej; img.src=r.result; }; r.onerror=rej; r.readAsDataURL(file); }); }
async function submitKYC(d){ await guard(async()=>{
  await updateDoc(doc(db,"users",S.user.uid),{name:d.fullName||S.profile.name,phone:d.phone||"",kyc:{
    status:"verified", fullName:d.fullName, idNumber:d.idNumber, phone:d.phone,
    idPhoto:d.idPhoto||"", selfie:d.selfie||"", at:Date.now() }});
  S.kycTmp={}; S.view="profile"; render(); alert("ยืนยันตัวตนสำเร็จ ✓ (จำลอง) — ตอนนี้ลงของและแลกได้แล้ว");
}); }

/* ---------- item / exchange actions (with error surfacing) ---------- */
async function addItem(d){ await guard(async()=>{
  await addDoc(collection(db,"items"),{...d,ownerUid:S.user.uid,ownerName:S.profile.name,status:"available",createdAt:serverTimestamp()});
  S.view="myitems"; render(); }); }
async function proposeExchange(myItemId,theirItem,topUp){ await guard(async()=>{
  await addDoc(collection(db,"exchanges"),{
    aUid:S.user.uid,aName:S.profile.name,aItemId:myItemId,
    bUid:theirItem.ownerUid,bName:theirItem.ownerName,bItemId:theirItem.id,
    topUpAmount:(topUp&&topUp.amount)||0, topUpBy:(topUp&&topUp.by)||"",
    state:"Proposed",aDeposited:false,bDeposited:false,aValidated:false,bValidated:false,aReceived:false,bReceived:false,rateA:0,rateB:0,
    history:[{t:"Proposed",by:S.profile.name,at:Date.now()}],createdAt:serverTimestamp() });
  S.view="exchanges"; render(); }); }
async function setItemStatus(id,st){ await updateDoc(doc(db,"items",id),{status:st}); }
async function exUpdate(ex,patch,note){
  await updateDoc(doc(db,"exchanges",ex.id),{...patch, history:arrayUnion({t:note||patch.state||"update",by:S.profile.name,at:Date.now()})}); }
async function acceptEx(ex){ await guard(async()=>{ await exUpdate(ex,{state:"Accepted"},"Accepted");
  await setItemStatus(ex.aItemId,"locked"); await setItemStatus(ex.bItemId,"locked");
  S.sel=ex.id; S.view="exDetail"; render(); alert("ยอมรับการแลกแล้ว ✓ — กด 'จำลองวางมัดจำ' เพื่อดำเนินการต่อ"); }); }
async function declineEx(ex){ await guard(async()=>{ await exUpdate(ex,{state:"Returned"},"ปฏิเสธ"); }); }
async function deposit(ex){ await guard(async()=>{ const mine=ex.aUid===S.user.uid?"aDeposited":"bDeposited";
  const patch={[mine]:true}; const other=mine==="aDeposited"?ex.bDeposited:ex.aDeposited; if(other) patch.state="Deposited";
  await exUpdate(ex,patch,"วางมัดจำ (จำลอง)"); }); }
async function hubReceive(ex){ await guard(async()=>{ await exUpdate(ex,{state:"AtHub"},"รับเข้าฮับ"); }); }
async function hubValidate(ex,pass){ await guard(async()=>{ if(pass){ await exUpdate(ex,{state:"Validated"},"ตรวจผ่าน (เทียบรูป)"); }
  else { await exUpdate(ex,{state:"Returned"},"ตรวจไม่ผ่าน ตีกลับ"); await setItemStatus(ex.aItemId,"available"); await setItemStatus(ex.bItemId,"available"); } }); }
async function hubLock(ex){ await guard(async()=>{ await exUpdate(ex,{state:"Locked"},"ล็อก & ปล่อยไขว้พร้อมกัน"); }); }
async function hubShip(ex){ await guard(async()=>{ await exUpdate(ex,{state:"Shipping"},"จำลองจัดส่ง"); }); }
async function confirmReceive(ex){ await guard(async()=>{ const mine=ex.aUid===S.user.uid?"aReceived":"bReceived";
  const patch={[mine]:true}; const other=mine==="aReceived"?ex.bReceived:ex.aReceived; if(other) patch.state="Completed";
  await exUpdate(ex,patch,"ยืนยันได้รับของ");
  if(other){ await setItemStatus(ex.aItemId,"swapped"); await setItemStatus(ex.bItemId,"swapped"); } }); }
async function seedDemo(){ await guard(async()=>{
  const s=[["รองเท้าผ้าใบ ไซซ์ 42","รองเท้า",500],["เสื้อแจ็คเก็ตยีนส์","เสื้อผ้า",700],["หนังสือนิยายชุด","หนังสือ",300],["ตุ๊กตาหมีวินเทจ","ของเล่น",250]];

let scanStream=null;
function stopScan(){ if(scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream=null; } const o=document.getElementById("scanModal"); if(o)o.remove(); }
async function startScan(onCode){
  const modal=$(`<div id="scanModal" style="position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px"></div>`);
  const vid=document.createElement("video"); vid.setAttribute("playsinline",""); vid.muted=true; vid.style.cssText="width:100%;max-width:330px;border-radius:14px;background:#000";
  const cv=document.createElement("canvas");
  const info=$(`<div style="color:#fff;margin:12px;font-size:14px">เล็ง QR ให้อยู่ในกรอบ…</div>`);
  const inp=$(`<input id="manualCode" placeholder="หรือพิมพ์รหัสใต้ QR" style="width:100%;max-width:330px">`);
  const mbtn=$(`<button class="btn pink" style="max-width:330px;margin-top:8px">ยืนยันรหัสที่พิมพ์</button>`);
  const close=$(`<button class="btn ghost" style="max-width:330px;margin-top:8px">ปิด</button>`);
  modal.append(vid,info,inp,mbtn,close); document.body.appendChild(modal);
  mbtn.onclick=()=>{ const v=inp.value.trim(); if(v){ stopScan(); onCode(v); } };
  close.onclick=stopScan;
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    vid.srcObject=scanStream; await vid.play();
    const ctx=cv.getContext("2d");
    const tick=()=>{ if(!scanStream)return;
      if(vid.readyState===vid.HAVE_ENOUGH_DATA){ cv.width=vid.videoWidth; cv.height=vid.videoHeight; ctx.drawImage(vid,0,0,cv.width,cv.height);
        try{ const img=ctx.getImageData(0,0,cv.width,cv.height); const code=jsQR(img.data,img.width,img.height); if(code&&code.data){ stopScan(); onCode(code.data); return; } }catch(_){} }
      requestAnimationFrame(tick); };
    requestAnimationFrame(tick);
  }catch(e){ info.textContent="เปิดกล้องไม่ได้ — พิมพ์รหัสแทนได้ ("+e.message+")"; }
}

async function aiMatch(){
  if(!AI_ON){ S.ai="(ยังไม่ได้ตั้งค่า GEMINI_API_KEY ในไฟล์ index.html — ฟีเจอร์อื่นใช้ได้ปกติ)"; render(); return; }
  S.aiLoading=true; render();
  const mine=myItems().map(i=>`${i.title} (${i.category}, ~${i.estValue}฿)`).join("; ")||"(ยังไม่มีของ)";
  const others=availOthers().map(i=>`${i.title} โดย ${i.ownerName} (${i.category}, ~${i.estValue}฿)`).join("; ")||"(ไม่มีของให้แลก)";
  const prompt=`คุณเป็นผู้ช่วยจับคู่แลกเปลี่ยนของมือสองในแอป "แลกกัน" ที่ช่วยให้เกิดการแลกจริง. ของของฉัน: ${mine}. ของที่คนอื่นลงไว้: ${others}. แนะนำการจับคู่ที่ดีที่สุด 3 คู่ เทียบมูลค่าและคิดส่วนต่าง ถ้าไม่พอดีให้บอกว่าควรเติมเงินส่วนต่างเท่าไรและใครเป็นคนเติม เพื่อให้ปิดดีลได้. ตอบภาษาไทยสั้น ๆ เป็นข้อ 1-3 คู่ละ 1 บรรทัดพร้อมส่วนต่าง.`;
  const models=["gemini-2.0-flash","gemini-flash-latest","gemini-2.5-flash","gemini-1.5-flash"]; let lastErr="";
  for(const model of models){
    try{
      const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`,{
        method:"POST",headers:{"Content-Type":"application/json","x-goog-api-key":GEMINI_API_KEY},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
      const j=await r.json();
      if(r.ok){ S.ai=j?.candidates?.[0]?.content?.parts?.[0]?.text || "AI ไม่ตอบ (ไม่มีเนื้อหา)"; lastErr=""; break; }
      lastErr=`${r.status} · ${(j&&j.error&&j.error.message)||JSON.stringify(j).slice(0,200)}`;
      if(r.status!==404) break;
    }catch(e){ lastErr="network/CORS: "+e.message; }
  }
  if(lastErr) S.ai="AI error → "+lastErr;
  S.aiLoading=false; render();
}
async function aiDescribeItem(dataUrl){
  const b64=(dataUrl||"").split(",")[1]; if(!b64) return null;
  const prompt=`ดูรูปสินค้ามือสองนี้ แล้วตอบเป็น JSON อย่างเดียว ห้ามมีข้อความอื่น รูปแบบ: {"title":"ชื่อสินค้าไทยสั้นๆ","category":"เลือก 1 คำจาก [${CATS.join(", ")}]","desc":"คำอธิบายทั่วไป 1 ประโยค","estValue": ตัวเลขบาทประเมินราคา}`;
  const models=["gemini-2.0-flash","gemini-flash-latest"];
  for(const model of models){
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`,{method:"POST",headers:{"Content-Type":"application/json","x-goog-api-key":GEMINI_API_KEY},body:JSON.stringify({contents:[{parts:[{text:prompt},{inline_data:{mime_type:"image/jpeg",data:b64}}]}]})});
    const j=await r.json();
    if(!r.ok){ if(r.status===404) continue; throw new Error((j&&j.error&&j.error.message)||("HTTP "+r.status)); }
    let txt=(j?.candidates?.[0]?.content?.parts?.[0]?.text||"").replace(/```json/gi,"").replace(/```/g,"").trim();
    const m=txt.match(/\{[\s\S]*\}/); if(m){ try{ return JSON.parse(m[0]); }catch(_){ return null; } }
    return null;
  }
  return null;
}

    <div style="flex:1"><div class="t">${esc(i.title)}</div><div class="m">${esc(i.category)} · ~${i.estValue||0}฿ · โดย ${esc(i.ownerName||"")}</div></div>
    <span class="pill ${i.status==='available'?'p-av':i.status==='locked'?'p-warn':'p-ok'}">${i.status==='available'?'ว่าง':i.status==='locked'?'กำลังแลก':'แลกแล้ว'}</span></div></div>`);
  if(i.status==='locked'){ c.style.background='#FFF9E6'; c.style.borderColor='#F0D264'; }
  if(onclick){ c.onclick=onclick; c.style.cursor="pointer"; } return c;
}
function productCard(i){

function stateFlow(cur){ const idx=STATES.indexOf(cur);
  return `<div class="state-flow">${STATES.map((s,k)=>`<span class="${k<idx?'done':k===idx?'cur':''}">${STATE_TH[s]}</span>`).join("")}${cur==="Returned"?'<span class="cur" style="background:var(--red)">ตีกลับ</span>':''}</div>`; }

    }
    w.appendChild(rc);

  const h=$(`<div class="card"><label>ประวัติสถานะ</label></div>`);
  (e.history||[]).slice().reverse().forEach(x=>h.appendChild($(`<div class="small" style="margin-top:5px">• ${esc(STATE_TH[x.t]||x.t)} — ${esc(x.by)}</div>`)));
  w.appendChild(h); return w;

function smartMatches(){
  const mine=myItems().filter(i=>i.status==="available"); const others=availOthers(); const out=[];
  mine.forEach(m=>others.forEach(o=>{ const diff=(o.estValue||0)-(m.estValue||0); out.push({m,o,diff,ad:Math.abs(diff)}); }));
  out.sort((a,b)=>a.ad-b.ad); return out.slice(0,8);
}

      : `<span class="pill p-warn">ของคุณแพงกว่า ฿${-diff}</span> &nbsp;<span class="small">→ อีกฝ่ายเติม ฿${-diff}</span>`;
    const c=$(`<div class="card"><div class="row"><div style="flex:1"><b>${esc(p.m.title)}</b><div class="small">ของคุณ · ~${p.m.estValue}฿</div></div><div style="font-size:18px">🔄</div><div style="flex:1;text-align:right"><b>${esc(p.o.title)}</b><div class="small">${esc(p.o.ownerName)} · ~${p.o.estValue}฿</div></div></div>
      <div style="margin:9px 0 4px">${msg}</div></div>`);
    const go=$(`<button class="btn pink sm" style="width:100%">เสนอแลก${tu?` + เติม ฿${tu.amount}`:''}</button>`); go.onclick=()=>proposeExchange(p.m.id,p.o,tu); c.appendChild(go);
    w.appendChild(c); });
  return w;
}
function profileView(){
  const w=$(`<div></div>`); w.appendChild($(`<h2 class="title">โปรไฟล์</h2>`));
  const c=$(`<div class="card"><div class="item"><div class="thumb">${S.profile?.kyc?.selfie?`<img src="${S.profile.kyc.selfie}">`:"👤"}</div>
    <div style="flex:1"><div class="t">${esc(S.profile.name)} ${verified()?'<span class="vbadge">✓ ยืนยันแล้ว</span>':''}</div><div class="m">${esc(S.profile.email||"")}</div>
    ${S.profile.phone?`<div class="m">📞 ${esc(S.profile.phone)}</div>`:""}</div></div></div>`);
  w.appendChild(c);
  if(!verified()){ const kb=$(`<div class="kyc-banner"><div style="font-size:26px">🪪</div><div style="flex:1"><b>ยังไม่ได้ยืนยันตัวตน</b><div class="small">ยืนยันเพื่อลงของและแลกเปลี่ยน</div></div></div>`);
    const b=$(`<button class="btn pink sm">ยืนยัน</button>`); b.onclick=()=>{S.view="kyc";render();}; kb.appendChild(b); w.appendChild(kb); }
  else { const b=$(`<button class="btn ghost" style="margin-bottom:12px">🪪 ดู/แก้ไขข้อมูล KYC</button>`); b.onclick=()=>{S.view="kyc";render();}; w.appendChild(b); }
  const stat=$(`<div class="kpi"></div>`);
  stat.appendChild($(`<div class="k"><div class="n">${myItems().length}</div><div class="l">ของที่ลงไว้</div></div>`));
  const done=S.exchanges.filter(e=>(e.aUid===S.user.uid||e.bUid===S.user.uid)&&e.state==="Completed").length;
  stat.appendChild($(`<div class="k"><div class="n">${done}</div><div class="l">แลกสำเร็จ</div></div>`));
  stat.appendChild($(`<div class="k"><div class="n">⭐ ${myRatingAvg()}</div><div class="l">คะแนนรีวิวที่ได้รับ</div></div>`));
  w.appendChild(stat);
  const out=$(`<button class="btn ghost" style="margin-top:12px">ออกจากระบบ</button>`); out.onclick=()=>signOut(auth); w.appendChild(out);
  return w;
}
/* ---------- HUB ---------- */
function hubView(){
  const w=$(`<div></div>`); w.appendChild($(`<h2 class="title">🏭 โมดูลฮับ</h2><div class="sub">ตรวจสอบ · ล็อกไขว้ · จัดส่ง</div>`));
  w.appendChild($(`<div class="warnbox">โหมดสาธิต: ทุกบัญชีเข้าฮับได้ · ระบบจริงจะจำกัดเฉพาะพนักงานฮับ</div>`));
  const q=S.exchanges.filter(e=>["Deposited","AtHub","Validated","Locked"].includes(e.state));
  if(!q.length) w.appendChild($(`<div class="hint">ยังไม่มีรายการรอที่ฮับ (ต้องผ่านขั้น "วางมัดจำ" ทั้งสองฝ่ายก่อน)</div>`));
  q.forEach(e=>{ const ai=S.items.find(x=>x.id===e.aItemId),bi=S.items.find(x=>x.id===e.bItemId);
    const c=$(`<div class="card"><div class="row"><div style="flex:1"><b>${esc(ai?.title||"?")}</b> ↔ <b>${esc(bi?.title||"?")}</b></div><span class="pill p-blue">${STATE_TH[e.state]}</span></div>${stateFlow(e.state)}</div>`);
    if(e.state==="Deposited"||e.state==="AtHub"){
      c.appendChild($(`<div class="small" style="margin-top:8px">สแกน QR คู่แลก เพื่อ <b>รับ + ตรวจ</b> ของเข้าฮับ (สแกน 1 ครั้ง เห็นทั้งคู่)</div>`));
      const sc=$(`<button class="btn navy sm" style="margin-top:8px">📷 สแกน QR คู่</button>`); sc.onclick=()=>startScan(hubHandleScan); c.appendChild(sc);
      const sim=$(`<button class="btn blue sm" style="margin-top:6px">🧪 จำลองสแกน (เดโม ไม่ใช้กล้อง)</button>`); sim.onclick=()=>hubHandleScan("LAKKAN:EX:"+e.id); c.appendChild(sim);
      const rj=$(`<button class="btn red sm" style="margin-top:6px">✕ ตรวจไม่ผ่าน / ตีกลับ</button>`); rj.onclick=()=>{ if(confirm("ตีกลับทั้งรายการ?")) hubReject(e); }; c.appendChild(rj); }
    if(e.state==="Validated"){ const b=$(`<button class="btn pink sm" style="margin-top:6px">🔒 ล็อก & ปล่อยไขว้พร้อมกัน</button>`); b.onclick=()=>hubLock(e); c.appendChild(b); }
    if(e.state==="Locked"){ const b=$(`<button class="btn blue sm" style="margin-top:6px">🚚 จำลองจัดส่งออกจากฮับ</button>`); b.onclick=()=>hubShip(e); c.appendChild(b); }
    w.appendChild(c); });
  return w;
}
/* ---------- ADMIN / FINANCE / COMPANY ---------- */
function adminView(){
  const w=$(`<div></div>`); w.appendChild($(`<h2 class="title">📊 แอดมิน</h2><div class="sub">ภาพรวมระบบ</div>`));
  const k=$(`<div class="kpi"></div>`);
  k.appendChild($(`<div class="k"><div class="n">${Object.keys(S.users).length}</div><div class="l">ผู้ใช้</div></div>`));
  k.appendChild($(`<div class="k"><div class="n">${Object.values(S.users).filter(u=>u.kyc?.status==='verified').length}</div><div class="l">ยืนยันตัวตนแล้ว</div></div>`));
  k.appendChild($(`<div class="k"><div class="n">${S.items.length}</div><div class="l">รายการของ</div></div>`));
  k.appendChild($(`<div class="k"><div class="n">${S.exchanges.filter(e=>e.state==="Completed").length}/${S.exchanges.length}</div><div class="l">แลกสำเร็จ/ทั้งหมด</div></div>`));
  w.appendChild(k);
  const seed=$(`<button class="btn ghost" style="margin:10px 0">🧪 สร้างรายการตัวอย่าง 4 ชิ้น (บัญชีนี้)</button>`); seed.onclick=seedDemo; w.appendChild(seed);
  const t=$(`<div class="card"><label>การแลกล่าสุด</label><table class="tbl"><tr><th>คู่แลก</th><th>สถานะ</th></tr>
    ${S.exchanges.slice(-8).reverse().map(e=>`<tr><td>${esc((S.items.find(x=>x.id===e.aItemId)||{}).title||"?")} ↔ ${esc((S.items.find(x=>x.id===e.bItemId)||{}).title||"?")}</td><td>${STATE_TH[e.state]}</td></tr>`).join("")||`<tr><td colspan=2 class="small">ยังไม่มีข้อมูล</td></tr>`}</table></div>`);
  w.appendChild(t); return w;
}
function financeView(){
  const w=$(`<div></div>`); w.appendChild($(`<h2 class="title">💰 การเงิน</h2><div class="sub">ค่าธรรมเนียมและ Royalty (จำลอง)</div>`));
  const completed=S.exchanges.filter(e=>e.state==="Completed");
  const royalty=completed.length*ROYALTY;
  const deposits=(S.exchanges.filter(e=>e.aDeposited).length + S.exchanges.filter(e=>e.bDeposited).length)*DEPOSIT;
  const k=$(`<div class="kpi"></div>`);
  k.appendChild($(`<div class="k"><div class="n">${completed.length}</div><div class="l">ธุรกรรมสำเร็จ</div></div>`));
  k.appendChild($(`<div class="k"><div class="n">฿${royalty.toLocaleString()}</div><div class="l">Royalty→LAKKAN (฿${ROYALTY}/รายการ)</div></div>`));
  k.appendChild($(`<div class="k"><div class="n">฿${deposits.toLocaleString()}</div><div class="l">มัดจำหมุนเวียน</div></div>`));
  k.appendChild($(`<div class="k"><div class="n">${S.exchanges.filter(e=>!["Completed","Returned"].includes(e.state)).length}</div><div class="l">กำลังดำเนินการ</div></div>`));
  w.appendChild(k);
  const t=$(`<div class="card"><label>รายการธุรกรรมสำเร็จ</label><table class="tbl"><tr><th>คู่แลก</th><th>Royalty</th></tr>
    ${completed.slice().reverse().map(e=>`<tr><td>${esc((S.items.find(x=>x.id===e.aItemId)||{}).title||"?")} ↔ ${esc((S.items.find(x=>x.id===e.bItemId)||{}).title||"?")}</td><td>฿${ROYALTY}</td></tr>`).join("")||`<tr><td colspan=2 class="small">ยังไม่มีธุรกรรมสำเร็จ</td></tr>`}</table></div>`);
  w.appendChild(t); return w;
}
function companyView(){
  const w=$(`<div></div>`); w.appendChild($(`<h2 class="title">🏢 บริษัท (KPI)</h2><div class="sub">ตัวชี้วัดสำหรับ Pilot</div>`));
  const total=S.exchanges.length, completed=S.exchanges.filter(e=>e.state==="Completed").length;
  const rate=total?Math.round(completed/total*100):0;
  const k=$(`<div class="kpi"></div>`);
  k.appendChild($(`<div class="k"><div class="n">${total}</div><div class="l">ธุรกรรมรวม</div></div>`));
  k.appendChild($(`<div class="k"><div class="n">${rate}%</div><div class="l">อัตราสำเร็จ</div></div>`));
  k.appendChild($(`<div class="k"><div class="n">${completed}</div><div class="l">สำเร็จ</div></div>`));
  k.appendChild($(`<div class="k"><div class="n">${S.exchanges.filter(e=>e.state==="Returned").length}</div><div class="l">ตีกลับ</div></div>`));
  w.appendChild(k);
  w.appendChild($(`<div class="card"><label>เป้าหมาย Pilot</label><div class="small" style="margin-top:6px">เกณฑ์ผ่าน KPI = ปริมาณธุรกรรม ~3,000/วัน (±10%) ที่เดือนที่ 6 · หน้านี้สะสมตัวเลขจริงจากการใช้งาน</div></div>`));
  w.appendChild($(`<div class="warnbox">การจ่ายเงินและการส่งของในเวอร์ชันนี้เป็น "จำลอง"</div>`));
  return w;
}
