<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>LAKKAN · แลกกัน</title>
<style>
:root{
  --pink:#F0509E; --pink-d:#D83A87; --blue:#2D8CF0; --cream:#FFF0F7; --navy:#102A43;
  --ink:#1B2B3A; --slate:#41556B; --muted:#8497AB; --line:#E7ECF2; --bg:#F5F7FA;
  --green:#16A34A; --amber:#B7791F; --red:#DC2626; --white:#fff; --tGreen:#E9F8EF; --tAmber:#FFF6E5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:"Sarabun","Leelawadee UI","Segoe UI",Tahoma,sans-serif;background:#dfe4ea;color:var(--ink);}
#app{max-width:440px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,.12);}
.topbar{background:var(--navy);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20;}
.topbar .logo{font-weight:800;font-size:19px;letter-spacing:.5px;}
.topbar .logo b{color:var(--pink);}
.topbar .sp{flex:1;}
.topbar .who{font-size:12px;opacity:.85;}
.modstrip{display:flex;gap:6px;overflow-x:auto;padding:8px 12px;background:#0b2030;position:sticky;top:52px;z-index:19;}
.modstrip::-webkit-scrollbar{display:none;}
.mpill{white-space:nowrap;border:none;background:#17324a;color:#cbd6e2;padding:6px 12px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;}
.mpill.on{background:var(--pink);color:#fff;}
.body{flex:1;padding:14px 14px 90px;overflow-y:auto;}
h2.title{font-size:20px;font-weight:800;color:var(--navy);margin:4px 0 2px;}
.sub{font-size:12.5px;color:var(--muted);margin-bottom:12px;}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(16,42,67,.04);}
.row{display:flex;gap:10px;align-items:center;}
.btn{display:inline-block;border:none;border-radius:11px;padding:12px 16px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;text-align:center;}
.btn.pink{background:var(--pink);color:#fff;} .btn.pink:active{background:var(--pink-d);}
.btn.blue{background:var(--blue);color:#fff;}
.btn.navy{background:var(--navy);color:#fff;}
.btn.ghost{background:#fff;color:var(--navy);border:1.5px solid var(--line);}
.btn.green{background:var(--green);color:#fff;}
.btn.red{background:#fff;color:var(--red);border:1.5px solid #f3c2c2;}
.btn.sm{width:auto;padding:8px 13px;font-size:13px;border-radius:9px;}
.btn:disabled{opacity:.5;}
input,textarea,select{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;font-size:14.5px;font-family:inherit;background:#fff;margin-top:6px;color:var(--ink);}
label{font-size:12.5px;font-weight:700;color:var(--slate);}
.field{margin-bottom:11px;}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;}
.p-av{background:var(--cream);color:var(--pink-d);}
.p-warn{background:var(--tAmber);color:var(--amber);}
.p-ok{background:var(--tGreen);color:var(--green);}
.p-blue{background:#EAF2FD;color:var(--blue);}
.item{display:flex;gap:12px;align-items:center;}
.thumb{width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,var(--cream),#e9f2ff);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.item .t{font-weight:700;font-size:14.5px;color:var(--ink);}
.item .m{font-size:12px;color:var(--muted);}
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:#fff;border-top:1px solid var(--line);display:flex;z-index:20;}
.bottomnav button{flex:1;border:none;background:none;padding:9px 0 11px;font-family:inherit;font-size:10.5px;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bottomnav button .ic{font-size:20px;}
.bottomnav button.on{color:var(--pink);font-weight:700;}
.center{min-height:82vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px;text-align:center;}
.splash-logo{font-size:40px;font-weight:800;color:var(--navy);}
.splash-logo b{color:var(--pink);}
.tag{font-size:13px;color:var(--slate);margin:6px 0 26px;}
.hint{background:#fff8fb;border:1px dashed var(--pink);border-radius:12px;padding:11px 13px;font-size:12.5px;color:var(--pink-d);margin-bottom:12px;}
.warnbox{background:var(--tAmber);border-left:4px solid var(--amber);border-radius:10px;padding:11px 13px;font-size:12.5px;color:#7a5712;margin-bottom:12px;}
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.kpi .k{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px;}
.kpi .k .n{font-size:23px;font-weight:800;color:var(--navy);}
.kpi .k .l{font-size:11.5px;color:var(--muted);}
.state-flow{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0;}
.state-flow span{font-size:10.5px;padding:3px 8px;border-radius:8px;background:#eef2f7;color:var(--muted);}
.state-flow span.done{background:var(--tGreen);color:var(--green);}
.state-flow span.cur{background:var(--pink);color:#fff;}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
.tbl th,.tbl td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:left;}
.tbl th{color:var(--muted);font-weight:700;}
.divider{height:1px;background:var(--line);margin:10px 0;}
.link{color:var(--blue);font-weight:700;cursor:pointer;font-size:13px;}
.err{color:var(--red);font-size:12.5px;margin-top:6px;}
.ai{background:linear-gradient(135deg,#fff,#f4f9ff);border:1px solid #d8e6f5;}
.spin{border:3px solid #eee;border-top:3px solid var(--pink);border-radius:50%;width:26px;height:26px;animation:s 1s linear infinite;margin:10px auto;}
@keyframes s{to{transform:rotate(360deg);}}
.small{font-size:11.5px;color:var(--muted);}
</style>
</head>
<body>
<div id="app"><div class="center"><div class="spin"></div><div class="small">กำลังโหลด…</div></div></div>

<script type="module">
/* ============================================================
   LAKKAN · แลกกัน — Firebase web app (Pilot)
   ------------------------------------------------------------
   >>> ตั้งค่า 2 จุดนี้ก่อนใช้งาน (ดูไฟล์ README-ตั้งค่า.md) <<<
   ============================================================ */
const firebaseConfig = {
    apiKey: "AIzaSyD1qeNjFrU-zGvvij9OyDDHgLzu-WoI1g4",
  authDomain: "lakkan-pilot.firebaseapp.com",
  projectId: "lakkan-pilot",
  storageBucket: "lakkan-pilot.firebasestorage.app",
  messagingSenderId: "969305561801",
  appId: "1:969305561801:web:6752e19db3ec9c3e6a4b18",
  measurementId: "G-XWT1J97QS9"
};
const GEMINI_API_KEY = "AQ.Ab8RN6IdVXYFkQBX5fJTyQJSZd3j_z6tPx1U1EdHzM3xmA9RAw"; // จาก Google AI Studio (aistudio.google.com)
/* ============================================================ */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, addDoc, getDoc, getDocs, updateDoc,
  onSnapshot, query, where, serverTimestamp, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const CONFIGURED = !firebaseConfig.apiKey.startsWith(firebaseConfig);
let auth, db;
if (CONFIGURED){ const fb=initializeApp(firebaseConfig); auth=getAuth(fb); db=getFirestore(fb); }

/* ---------- state ---------- */
const S = { user:null, profile:null, role:"member", view:"feed",
  items:[], exchanges:[], users:{}, sel:null, ai:null, aiLoading:false, err:"" };
const CATS = ["เสื้อผ้า","รองเท้า","หนังสือ","ของสะสม","ของเล่น","อิเล็กทรอนิกส์","ของแต่งบ้าน","อื่นๆ"];
const CATICON = {"เสื้อผ้า":"👕","รองเท้า":"👟","หนังสือ":"📚","ของสะสม":"🏺","ของเล่น":"🧸","อิเล็กทรอนิกส์":"📱","ของแต่งบ้าน":"🖼️","อื่นๆ":"📦"};
const ROYALTY=3, DEPOSIT=100; // mock
const STATES=["Proposed","Accepted","Deposited","AtHub","Validated","Locked","Shipping","Completed"];
const STATE_TH={Proposed:"เสนอแลก",Accepted:"ยอมรับแล้ว",Deposited:"วางมัดจำแล้ว",AtHub:"ถึงฮับ",Validated:"ตรวจผ่าน",Locked:"ล็อกไขว้",Shipping:"กำลังจัดส่ง",Completed:"สำเร็จ",Returned:"ตีกลับ"};

const $ = (h)=>{const d=document.createElement("div");d.innerHTML=h;return d.firstElementChild;};
const app = document.getElementById("app");
const esc = (s)=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const U = (uid)=>S.users[uid]||{name:"ผู้ใช้"};
const myItems = ()=>S.items.filter(i=>i.ownerUid===S.user.uid);
const availOthers = ()=>S.items.filter(i=>i.ownerUid!==S.user.uid && i.status==="available");

/* ---------- boot ---------- */
if(!CONFIGURED){ renderSetupNeeded(); }
else {
  onAuthStateChanged(auth, async (u)=>{
    if(u){ S.user=u; await ensureProfile(u); subscribe(); render(); }
    else { S.user=null; render(); }
  });
}

function renderSetupNeeded(){
  app.innerHTML="";
  app.appendChild($(`<div class="center">
    <div class="splash-logo">แลก<b>กัน</b></div>
    <div class="tag">LAKKAN · ระบบแลกเปลี่ยนที่เชื่อถือได้</div>
    <div class="warnbox" style="text-align:left">ยังไม่ได้ตั้งค่า Firebase — เปิดไฟล์ <b>index.html</b> วางค่า <b>firebaseConfig</b> และ <b>GEMINI_API_KEY</b> ตามคู่มือ <b>README-ตั้งค่า.md</b> ก่อนใช้งาน</div>
  </div>`));
}

async function ensureProfile(u){
  const ref=doc(db,"users",u.uid);
  const snap=await getDoc(ref);
  if(!snap.exists()){
    await setDoc(ref,{name:u.displayName||u.email.split("@")[0],email:u.email,phone:"",createdAt:serverTimestamp()});
  }
  S.profile=(await getDoc(ref)).data();
}

let unsubItems=null, unsubEx=null, unsubUsers=null;
function subscribe(){
  unsubItems&&unsubItems(); unsubEx&&unsubEx(); unsubUsers&&unsubUsers();
  unsubItems=onSnapshot(collection(db,"items"),s=>{ S.items=s.docs.map(d=>({id:d.id,...d.data()})); render(); });
  unsubEx=onSnapshot(collection(db,"exchanges"),s=>{ S.exchanges=s.docs.map(d=>({id:d.id,...d.data()})); render(); });
  unsubUsers=onSnapshot(collection(db,"users"),s=>{ S.users={}; s.docs.forEach(d=>S.users[d.id]=d.data()); render(); });
}

/* ---------- actions ---------- */
async function signUp(name,email,pass){ S.err="";
  try{ const c=await createUserWithEmailAndPassword(auth,email,pass);
    await setDoc(doc(db,"users",c.user.uid),{name,email,phone:"",createdAt:serverTimestamp()});
  }catch(e){ S.err=fbErr(e); render(); } }
async function signIn(email,pass){ S.err=""; try{ await signInWithEmailAndPassword(auth,email,pass);}catch(e){ S.err=fbErr(e); render(); } }
async function googleIn(){ S.err=""; try{ await signInWithPopup(auth,new GoogleAuthProvider()); }catch(e){ S.err=fbErr(e); render(); } }
function fbErr(e){ const m=(e.code||"").replace("auth/","");
  return ({"invalid-email":"อีเมลไม่ถูกต้อง","weak-password":"รหัสผ่านสั้นเกินไป (อย่างน้อย 6 ตัว)","email-already-in-use":"อีเมลนี้ถูกใช้แล้ว","invalid-credential":"อีเมลหรือรหัสผ่านไม่ถูกต้อง","popup-closed-by-user":"ปิดหน้าต่างก่อนเข้าสู่ระบบ"}[m]||("ผิดพลาด: "+(e.code||e.message))); }

async function addItem(d){ await addDoc(collection(db,"items"),{...d,ownerUid:S.user.uid,ownerName:S.profile.name,status:"available",createdAt:serverTimestamp()}); S.view="myitems"; render(); }
async function proposeExchange(myItemId,theirItem){
  await addDoc(collection(db,"exchanges"),{
    aUid:S.user.uid,aName:S.profile.name,aItemId:myItemId,
    bUid:theirItem.ownerUid,bName:theirItem.ownerName,bItemId:theirItem.id,
    state:"Proposed",aDeposited:false,bDeposited:false,aReceived:false,bReceived:false,
    history:[{t:"Proposed",by:S.profile.name,at:Date.now()}],createdAt:serverTimestamp()
  });
  S.view="exchanges"; render();
}
async function setItemStatus(id,st){ await updateDoc(doc(db,"items",id),{status:st}); }
async function exUpdate(ex,patch,note){
  await updateDoc(doc(db,"exchanges",ex.id),{...patch, history:arrayUnion({t:note||patch.state||"update",by:S.profile.name,at:Date.now()})});
}
async function acceptEx(ex){ await exUpdate(ex,{state:"Accepted"},"Accepted");
  await setItemStatus(ex.aItemId,"locked"); await setItemStatus(ex.bItemId,"locked"); }
async function declineEx(ex){ await exUpdate(ex,{state:"Returned"},"ปฏิเสธ"); }
async function deposit(ex){ const mine=ex.aUid===S.user.uid?"aDeposited":"bDeposited";
  const patch={[mine]:true}; const other=mine==="aDeposited"?ex.bDeposited:ex.aDeposited;
  if(other) patch.state="Deposited";
  await exUpdate(ex,patch,"วางมัดจำ (จำลอง)"); }
async function hubReceive(ex){ await exUpdate(ex,{state:"AtHub"},"รับเข้าฮับ"); }
async function hubValidate(ex,pass){ if(pass){ await exUpdate(ex,{state:"Validated"},"ตรวจผ่าน (เทียบรูป)"); }
  else { await exUpdate(ex,{state:"Returned"},"ตรวจไม่ผ่าน ตีกลับ"); await setItemStatus(ex.aItemId,"available"); await setItemStatus(ex.bItemId,"available"); } }
async function hubLock(ex){ await exUpdate(ex,{state:"Locked"},"ล็อก & ปล่อยไขว้พร้อมกัน"); }
async function hubShip(ex){ await exUpdate(ex,{state:"Shipping"},"จำลองจัดส่ง"); }
async function confirmReceive(ex){ const mine=ex.aUid===S.user.uid?"aReceived":"bReceived";
  const patch={[mine]:true}; const other=mine==="aReceived"?ex.bReceived:ex.aReceived;
  if(other){ patch.state="Completed"; }
  await exUpdate(ex,patch,"ยืนยันได้รับของ");
  if(other){ await setItemStatus(ex.aItemId,"swapped"); await setItemStatus(ex.bItemId,"swapped"); } }

async function seedDemo(){
  const samples=[["รองเท้าผ้าใบ ไซซ์ 42","รองเท้า",500],["เสื้อแจ็คเก็ตยีนส์","เสื้อผ้า",700],["หนังสือนิยายชุด","หนังสือ",300],["ตุ๊กตาหมีวินเทจ","ของเล่น",250]];
  for(const [t,c,v] of samples){ await addItem2({title:t,category:c,estValue:v,desc:"ของสภาพดี (เดโม)"}); }
  alert("สร้างรายการตัวอย่างให้บัญชีนี้แล้ว 4 ชิ้น");
}
async function addItem2(d){ await addDoc(collection(db,"items"),{...d,ownerUid:S.user.uid,ownerName:S.profile.name,status:"available",createdAt:serverTimestamp()}); }

/* ---------- Gemini AI matching ---------- */
async function aiMatch(){
  if(GEMINI_API_KEY.startsWith(firebaseConfig)){ S.ai="(ยังไม่ได้ตั้งค่า GEMINI_API_KEY ในไฟล์ index.html)"; render(); return; }
  S.aiLoading=true; render();
  const mine=myItems().map(i=>`${i.title} (${i.category}, ~${i.estValue}฿)`).join("; ")||"(ยังไม่มีของ)";
  const others=availOthers().map(i=>`[${i.id}] ${i.title} โดย ${i.ownerName} (${i.category}, ~${i.estValue}฿)`).join("; ")||"(ไม่มีของให้แลก)";
  const prompt=`คุณเป็นผู้ช่วยจับคู่แลกเปลี่ยนของมือสองในแอป "แลกกัน". ของของฉัน: ${mine}. ของที่คนอื่นลงไว้: ${others}. `+
    `เลือกการจับคู่ที่น่าสนใจที่สุด 3 คู่ (ของฉัน ↔ ของคนอื่น) โดยดูมูลค่าใกล้เคียงและความน่าจะพอใจ. ตอบเป็นภาษาไทยสั้นๆ เป็นข้อ 1-3 พร้อมเหตุผลบรรทัดเดียวต่อคู่.`;
  try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
    const j=await r.json();
    S.ai=j?.candidates?.[0]?.content?.parts?.[0]?.text || ("AI ไม่ตอบ: "+JSON.stringify(j).slice(0,180));
  }catch(e){ S.ai="เรียก AI ไม่สำเร็จ: "+e.message; }
  S.aiLoading=false; render();
}

/* ============================================================ RENDER ============================================================ */
function render(){
  if(!CONFIGURED){ renderSetupNeeded(); return; }
  if(!S.user){ renderAuth(); return; }
  app.innerHTML="";
  app.appendChild(topbar());
  app.appendChild(modstrip());
  const body=$(`<div class="body"></div>`);
  if(S.role==="member") body.appendChild(memberView());
  else if(S.role==="hub") body.appendChild(hubView());
  else if(S.role==="admin") body.appendChild(adminView());
  else if(S.role==="finance") body.appendChild(financeView());
  else if(S.role==="company") body.appendChild(companyView());
  app.appendChild(body);
  if(S.role==="member") app.appendChild(bottomnav());
}

function topbar(){
  const t=$(`<div class="topbar"><div class="logo">แลก<b>กัน</b></div><div class="sp"></div>
    <div class="who">${esc(S.profile?.name||"")}</div></div>`);
  const b=$(`<button class="btn ghost sm" style="width:auto;padding:6px 10px">ออก</button>`);
  b.onclick=()=>signOut(auth); t.appendChild(b); return t;
}
function modstrip(){
  const mods=[["member","◍ สมาชิก"],["hub","🏭 ฮับ"],["admin","📊 แอดมิน"],["finance","💰 การเงิน"],["company","🏢 บริษัท"]];
  const s=$(`<div class="modstrip"></div>`);
  mods.forEach(m=>{ const b=$(`<button class="mpill ${S.role===m[0]?'on':''}">${m[1]}</button>`);
    b.onclick=()=>{S.role=m[0]; S.view= m[0]==="member"?"feed":m[0]; S.sel=null; render();}; s.appendChild(b); });
  return s;
}
function bottomnav(){
  const items=[["feed","🏠","หน้าแรก"],["myitems","📦","ของฉัน"],["additem","➕","ลงของ"],["exchanges","🔄","การแลก"],["profile","👤","ฉัน"]];
  const n=$(`<div class="bottomnav"></div>`);
  items.forEach(i=>{ const b=$(`<button class="${S.view===i[0]?'on':''}"><span class="ic">${i[1]}</span>${i[2]}</button>`);
    b.onclick=()=>{S.view=i[0];S.sel=null;render();}; n.appendChild(b); });
  return n;
}

/* ---------- AUTH ---------- */
function renderAuth(){
  app.innerHTML="";
  const wrap=$(`<div class="center"></div>`);
  wrap.appendChild($(`<div class="splash-logo">แลก<b>กัน</b></div>`));
  wrap.appendChild($(`<div class="tag">ซื้อ–ขาย–แลกเปลี่ยนของมือสอง อย่างเชื่อถือได้</div>`));
  const c=$(`<div class="card" style="width:100%;text-align:left"></div>`);
  let mode="in"; // in | up
  const render2=()=>{
    c.innerHTML="";
    c.appendChild($(`<h2 class="title">${mode==="in"?"เข้าสู่ระบบ":"สมัครสมาชิก"}</h2>`));
    let name,email,pass;
    if(mode==="up"){ const f=$(`<div class="field"><label>ชื่อ</label><input placeholder="ชื่อของคุณ"></div>`); name=f.querySelector("input"); c.appendChild(f); }
    const fe=$(`<div class="field"><label>อีเมล</label><input type="email" placeholder="you@email.com"></div>`); email=fe.querySelector("input"); c.appendChild(fe);
    const fp=$(`<div class="field"><label>รหัสผ่าน</label><input type="password" placeholder="อย่างน้อย 6 ตัว"></div>`); pass=fp.querySelector("input"); c.appendChild(fp);
    if(S.err) c.appendChild($(`<div class="err">${esc(S.err)}</div>`));
    const go=$(`<button class="btn pink" style="margin-top:6px">${mode==="in"?"เข้าสู่ระบบ":"สมัครและเข้าใช้"}</button>`);
    go.onclick=()=>{ if(mode==="in") signIn(email.value.trim(),pass.value); else signUp((name.value||"").trim()||email.value.split("@")[0],email.value.trim(),pass.value); };
    c.appendChild(go);
    const g=$(`<button class="btn ghost" style="margin-top:8px">➤ ดำเนินการด้วย Google</button>`); g.onclick=googleIn; c.appendChild(g);
    const sw=$(`<div style="text-align:center;margin-top:12px" class="link">${mode==="in"?"ยังไม่มีบัญชี? สมัครสมาชิก":"มีบัญชีแล้ว? เข้าสู่ระบบ"}</div>`);
    sw.onclick=()=>{mode=mode==="in"?"up":"in";S.err="";render2();}; c.appendChild(sw);
  };
  render2(); wrap.appendChild(c);
  wrap.appendChild($(`<div class="small" style="margin-top:14px">เดโม: สมัคร 2 บัญชี (หรือ Google + อีเมล) เพื่อทดสอบการแลกระหว่างกัน</div>`));
  app.appendChild(wrap);
}

function memberView(){
  if(S.view==="feed") return feed();
  if(S.view==="myitems") return myItemsView();
  if(S.view==="additem") return addItemView();
  if(S.view==="exchanges") return exchangesView();
  if(S.view==="profile") return profileView();

function itemCard(i,onclick){
  const c=$(`<div class="card"><div class="item"><div class="thumb">${CATICON[i.category]||"📦"}</div>

    <span class="pill ${i.status==='available'?'p-av':i.status==='locked'?'p-warn':'p-ok'}">${i.status==='available'?'ว่าง':i.status==='locked'?'กำลังแลก':'แลกแล้ว'}</span></div></div>`);

  if(!list.length) w.appendChild($(`<div class="hint">ยังไม่มีของจากคนอื่น — ชวนเพื่อนสมัครและลงของ หรือไปที่โมดูลแอดมินกด "สร้างรายการตัวอย่าง"</div>`));
  list.forEach(i=>w.appendChild(itemCard(i,()=>{S.sel=i.id;S.view="itemDetail";render();})));
  return w;
}
function itemDetailView(){

function myItemsView(){

function addItemView(){
  const w=$(`<div></div>`); w.appendChild($(`<h2 class="title">ลงของ</h2><div class="sub">ของที่ไม่ใช้แล้ว = โอกาสได้ของใหม่</div>`));
  const c=$(`<div class="card"></div>`);
  const ft=$(`<div class="field"><label>ชื่อสิ่งของ</label><input placeholder="เช่น รองเท้าผ้าใบ ไซซ์ 42"></div>`);
  const fc=$(`<div class="field"><label>หมวดหมู่</label><select>${CATS.map(c=>`<option>${c}</option>`).join("")}</select></div>`);
  const fv=$(`<div class="field"><label>มูลค่าประเมิน (บาท)</label><input type="number" placeholder="เช่น 500"></div>`);

function stateFlow(cur){
  const idx=STATES.indexOf(cur);
  return `<div class="state-flow">${STATES.map((s,k)=>`<span class="${k<idx?'done':k===idx?'cur':''}">${STATE_TH[s]}</span>`).join("")}${cur==="Returned"?'<span class="cur" style="background:var(--red)">ตีกลับ</span>':''}</div>`;
}
function exchangesView(){
  const w=$(`<div></div>`); w.appendChild($(`<h2 class="title">การแลกของฉัน</h2><div class="sub">ทั้งที่ฉันเสนอและมีคนเสนอมา</div>`));
  const mine=S.exchanges.filter(e=>e.aUid===S.user.uid||e.bUid===S.user.uid);
  if(!mine.length) w.appendChild($(`<div class="hint">ยังไม่มีรายการแลก ไปที่ "หน้าแรก" เพื่อเสนอแลก</div>`));
  mine.forEach(e=>{ const ai=S.items.find(x=>x.id===e.aItemId),bi=S.items.find(x=>x.id===e.bItemId);
    const c=$(`<div class="card"><div class="row"><div style="flex:1"><b>${esc(ai?.title||"?")}</b> <span class="small">↔</span> <b>${esc(bi?.title||"?")}</b></div>
      <span class="pill ${e.state==='Completed'?'p-ok':e.state==='Returned'?'p-warn':'p-blue'}">${STATE_TH[e.state]}</span></div>
      <div class="small" style="margin-top:4px">${e.aUid===S.user.uid?"คุณเสนอ":"เสนอโดย "+esc(e.aName)}</div></div>`);
    c.style.cursor="pointer"; c.onclick=()=>{S.sel=e.id;S.view="exDetail";render();}; w.appendChild(c); });
  return w;
}
function exDetailView(){
  const e=S.exchanges.find(x=>x.id===S.sel); if(!e) return exchangesView();
  const ai=S.items.find(x=>x.id===e.aItemId),bi=S.items.find(x=>x.id===e.bItemId);
  const w=$(`<div></div>`); const back=$(`<div class="link" style="margin-bottom:8px">‹ กลับ</div>`); back.onclick=()=>{S.view="exchanges";render();}; w.appendChild(back);
  w.appendChild($(`<div class="card"><div class="row"><div style="flex:1;text-align:center"><div class="thumb" style="margin:0 auto 6px">${CATICON[ai?.category]||"📦"}</div><b>${esc(ai?.title||"?")}</b><div class="small">${esc(e.aName)}</div></div>
    <div style="font-size:22px">🔄</div>
    <div style="flex:1;text-align:center"><div class="thumb" style="margin:0 auto 6px">${CATICON[bi?.category]||"📦"}</div><b>${esc(bi?.title||"?")}</b><div class="small">${esc(e.bName)}</div></div></div>
    ${stateFlow(e.state)}</div>`));
  const me=S.user.uid, isA=e.aUid===me, isB=e.bUid===me;
  const act=$(`<div class="card"></div>`); let has=false;
  const addBtn=(label,cls,fn)=>{ const b=$(`<button class="btn ${cls}" style="margin-top:8px">${label}</button>`); b.onclick=fn; act.appendChild(b); has=true; };
  if(e.state==="Proposed" && isB){ addBtn("✓ ยอมรับการแลก","green",()=>acceptEx(e)); addBtn("✕ ปฏิเสธ","red",()=>declineEx(e)); }
  if(e.state==="Proposed" && isA){ act.appendChild($(`<div class="small">รอ ${esc(e.bName)} ยอมรับ</div>`)); has=true; }
  if(e.state==="Accepted"){ const mineDep=isA?e.aDeposited:e.bDeposited;
    if(mineDep) act.appendChild($(`<div class="small">คุณวางมัดจำแล้ว — รออีกฝ่าย</div>`)),has=true;
    else addBtn(`💳 จำลองวางมัดจำ ${DEPOSIT}฿`,"pink",()=>deposit(e)); }
  if(e.state==="Shipping"){ const mineRec=isA?e.aReceived:e.bReceived;
    if(mineRec) act.appendChild($(`<div class="small">คุณยืนยันรับของแล้ว — รออีกฝ่าย</div>`)),has=true;
    else addBtn("📦 ยืนยันได้รับของ (จำลอง)","green",()=>confirmReceive(e)); }
  if(["Deposited","AtHub","Validated","Locked"].includes(e.state)) { act.appendChild($(`<div class="small">อยู่ระหว่างดำเนินการที่ฮับ — ติดตามในโมดูล 🏭 ฮับ</div>`)); has=true; }
  if(e.state==="Completed") act.appendChild($(`<div class="p-ok pill">แลกสำเร็จ 🎉</div>`)),has=true;
  if(e.state==="Returned") act.appendChild($(`<div class="p-warn pill">รายการถูกตีกลับ/ยกเลิก</div>`)),has=true;
  if(has) w.appendChild(act);
  // history
  const h=$(`<div class="card"><label>ประวัติสถานะ</label></div>`);
  (e.history||[]).slice().reverse().forEach(x=>h.appendChild($(`<div class="small" style="margin-top:5px">• ${esc(STATE_TH[x.t]||x.t)} — ${esc(x.by)}</div>`)));
  w.appendChild(h); return w;
}
function aiView(){
  const w=$(`<div></div>`); const back=$(`<div class="link" style="margin-bottom:8px">‹ กลับ</div>`); back.onclick=()=>{S.view="feed";render();}; w.appendChild(back);
  w.appendChild($(`<h2 class="title">✨ AI จับคู่การแลก</h2><div class="sub">Gemini วิเคราะห์ของคุณเทียบกับของในระบบ</div>`));

function profileView(){

  const c=$(`<div class="card"><div class="item"><div class="thumb">👤</div><div><div class="t">${esc(S.profile.name)}</div><div class="m">${esc(S.profile.email||"")}</div></div></div></div>`);

/* ---------- HUB ---------- */
function hubView(){
  const w=$(`<div></div>`); w.appendChild($(`<h2 class="title">🏭 โมดูลฮับ</h2><div class="sub">ตรวจสอบ · ล็อกไขว้ · จัดส่ง</div>`));
  w.appendChild($(`<div class="warnbox">โหมดสาธิต: ทุกบัญชีเข้าฮับได้ · ระบบจริงจะจำกัดเฉพาะพนักงานฮับ</div>`));
  const q=S.exchanges.filter(e=>["Deposited","AtHub","Validated","Locked"].includes(e.state));
  if(!q.length) w.appendChild($(`<div class="hint">ยังไม่มีรายการรอที่ฮับ (ต้องผ่านขั้น "วางมัดจำ" ทั้งสองฝ่ายก่อน)</div>`));
  q.forEach(e=>{ const ai=S.items.find(x=>x.id===e.aItemId),bi=S.items.find(x=>x.id===e.bItemId);
    const c=$(`<div class="card"><div class="row"><div style="flex:1"><b>${esc(ai?.title||"?")}</b> ↔ <b>${esc(bi?.title||"?")}</b></div><span class="pill p-blue">${STATE_TH[e.state]}</span></div>${stateFlow(e.state)}</div>`);
    if(e.state==="Deposited"){ const b=$(`<button class="btn navy sm" style="margin-top:6px">รับของเข้าฮับ</button>`); b.onclick=()=>hubReceive(e); c.appendChild(b); }
    if(e.state==="AtHub"){ const r=$(`<div class="row" style="margin-top:8px;gap:8px"></div>`);
      const p=$(`<button class="btn green sm" style="flex:1">✓ ตรวจผ่าน (เทียบรูป)</button>`); p.onclick=()=>hubValidate(e,true);
      const f=$(`<button class="btn red sm" style="flex:1">✕ ไม่ผ่าน</button>`); f.onclick=()=>hubValidate(e,false); r.append(p,f); c.appendChild(r); }
    if(e.state==="Validated"){ const b=$(`<button class="btn pink sm" style="margin-top:6px">🔒 ล็อก & ปล่อยไขว้พร้อมกัน</button>`); b.onclick=()=>hubLock(e); c.appendChild(b); }
    if(e.state==="Locked"){ const b=$(`<button class="btn blue sm" style="margin-top:6px">🚚 จำลองจัดส่งออกจากฮับ</button>`); b.onclick=()=>hubShip(e); c.appendChild(b); }
    w.appendChild(c); });
  return w;
}
